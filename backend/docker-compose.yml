version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: spotify_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: spotify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: spotify_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
