spring:
  application:
    name: spotify-clone-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/spotify
    username: postgres
    password: daithien2004
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
  flyway:
    enabled: true
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: a-very-secure-and-long-secret-key-for-jwt-signing-which-should-be-in-env-variables-in-prod
  expiration: 86400000 # 1 day in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds
